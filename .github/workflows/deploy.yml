name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # 监听 main 分支的 push 事件

# 设置 GitHub Actions 的权限，允许它写入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同时只有一个部署任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 推荐使用较新的稳定版 Node
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # 比 npm install 更快、更严格，适合 CI 环境

      - name: Build
        run: npm run build # 在 GitHub 服务器上打包，生成 dist 目录

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 默认的打包输出目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4